server {
    listen 80;
    server_name radiotecpro.com *.radiotecpro.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name radiotecpro.com;

    ssl_certificate /etc/letsencrypt/live/radiotecpro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/radiotecpro.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name facturapro.radiotecpro.com;

    ssl_certificate /etc/letsencrypt/live/radiotecpro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/radiotecpro.com/privkey.pem;

    location /api/ {
        proxy_pass http://localhost:4050/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://localhost:3050;
        proxy_set_header Host $host;
    }
}

server {
    listen 443 ssl http2;
    server_name app.radiotecpro.com; # RentControl

    ssl_certificate /etc/letsencrypt/live/radiotecpro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/radiotecpro.com/privkey.pem;

    location /api/ {
        proxy_pass http://localhost:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
    }
}

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: facturapro-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-facturapro}
    volumes:
      - facturapro-db-data:/var/lib/postgresql/data
    networks:
      - facturapro-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: facturapro-backend
    restart: always
    depends_on:
      - db
    ports:
      - "4050:4000"
    environment:
      # Prisma connection string to the local DB container
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-facturapro}?schema=public
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key}
      NODE_ENV: production
    env_file:
      - ./backend/.env
    volumes:
      # Persist uploads (XMLs, PDFs, Employee Docs)
      - facturapro-uploads:/app/uploads
    networks:
      - facturapro-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: facturapro-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3050:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4050}
      BACKEND_INTERNAL_URL: http://backend:4000
    networks:
      - facturapro-network

volumes:
  facturapro-db-data:
  facturapro-uploads:

networks:
  facturapro-network:
    driver: bridge
